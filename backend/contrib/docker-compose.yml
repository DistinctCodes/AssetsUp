version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: assetsup-db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_DATABASE:-assetsup}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - assetsup-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assetsup-backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-6003}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_DATABASE: ${DB_DATABASE:-assetsup}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret}
    ports:
      - "6003:6003"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./src:/app/src
    networks:
      - assetsup-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  assetsup-network:
    driver: bridge
